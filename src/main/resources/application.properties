server.port=${PORT:8080}

# -------------------------------------------------------
# Datasource
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}

# -------------------------------------------------------
# JPA / Hibernate
# ATENÇÃO: use "validate" em produção para nunca alterar
# o schema automaticamente. Use "update" só em dev local.
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# CORS — defina a origem real do seu frontend em produção
# Exemplo: cors.allowed-origins=https://seusite.com.br
# -------------------------------------------------------
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
