server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# CRÍTICO — nunca deixar sem valor padrão longo
jwt.secret=${JWT_SECRET:uma-chave-de-pelo-menos-64-caracteres-para-hmac-sha-segura-aqui}
jwt.expiration=${JWT_EXPIRATION:28800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

spring.sql.init.mode=${SQL_INIT_MODE:never}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
spring.jackson.default-property-inclusion=non_null
