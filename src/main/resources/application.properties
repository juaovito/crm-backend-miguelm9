server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:crm}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

jwt.secret=${JWT_SECRET:mude-esta-chave-em-producao-use-no-minimo-64-caracteres-aleatorios}
jwt.expiration=${JWT_EXPIRATION:28800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
